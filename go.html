<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .loader { width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.2); border-top-color: #25D366; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="loader"></div>
    <div class="title">Conectando con un Acesor...</div>
  </div>

  <script>
    const WHATSAPP_URL = 'https://api.whatsapp.com/send?phone=541161190266&text=Hola%20quiero%20m%C3%A1s%20informaci%C3%B3n';
    const WORKER_URL = 'https://katyblue.daniyons1996.workers.dev/';

    async function processAndRedirect() {
      // Recuperar el ID del index.html
      const eventId = sessionStorage.getItem('wa_event_id') || ('evt_' + Date.now());
      
      const fbp = localStorage.getItem('fbp');
      const fbc = localStorage.getItem('fbc');

      // Enviar al Worker (Segundo plano)
      fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event_name: '',
          event_id: eventId,
          page_url: window.location.href,
          fbp: fbp,
          fbc: fbc
        }),
        keepalive: true
      }).catch(err => console.log("Worker error ignored"));

      // Redirigir inmediatamente a WhatsApp sin esperar al Worker
      setTimeout(() => {
        window.location.replace(WHATSAPP_URL);
      }, 400);
    }

    window.onload = processAndRedirect;
  </script>
</body>
</html>
