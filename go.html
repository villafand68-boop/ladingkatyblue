<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body {
      background-color: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #25D366;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>

<script>
  // Configuración del destino
  const numero = '5491161190295';
  const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
  const eventId = sessionStorage.getItem('wa_event_id');

  // Función corregida para obtener cookies de Meta (_fbp, _fbc)
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
  }

  async function procesarYRedirigir() {
    // Si no hay datos, volvemos al inicio
    if (!nombre || !eventId) {
      window.location.href = 'index.html';
      return;
    }

    try {
      // Enviamos el evento al Worker de Cloudflare
      // keepalive: true asegura que la petición termine aunque el usuario salga de la página
      await fetch("https://katyblue.daniyons1996.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        keepalive: true, 
        body: JSON.stringify({
          event_id: eventId,
          event_name: "",
          nombre: nombre,
          page_url: window.location.href, // Envía tu dominio real automáticamente
          fbp: getCookie('_fbp'),
          fbc: getCookie('_fbc')
        })
      });
      console.log("Evento enviado al servidor");
    } catch (error) {
      console.error("Error al contactar al Worker:", error);
    }

    // Preparación del enlace de WhatsApp
    const mensaje = `Hola, soy ${nombre} y quiero más información`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    // Esperamos 1.2 segundos para que el servidor de Meta procese el evento
    setTimeout(() => {
      window.location.replace(url);
    }, 1200);
  }

  // Iniciar el proceso
  procesarYRedirigir();
</script>
</body>
</html>
