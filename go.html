<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body {
      background-color: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #25D366;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    const PIXEL_ID = '1491313232345277';
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=true;
    t.src=v;s=b.getElementsByTagName(e);
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    fbq('init', PIXEL_ID);
  </script>
</head>
<body>
  <div class="loader"></div>

<script>
  // 1. Configuración del destino y obtención de datos
  const numero = '5491161190295'; // Tu nuevo número
  const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
  const eventId = sessionStorage.getItem('wa_event_id');

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
  }

  async function procesarYRedirigir() {
    if (!nombre || !eventId) {
      window.location.href = 'index.html';
      return;
    }

    // --- PASO A: DISPARO EN EL NAVEGADOR (Para deduplicación) ---
    fbq('track', 'Contact', {}, { eventID: eventId });

    try {
      // --- PASO B: DISPARO EN EL SERVIDOR (Worker) ---
      await fetch("https://katyblue.daniyons1996.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        keepalive: true, 
        body: JSON.stringify({
          event_id: eventId,
          event_name: "Contact",
          nombre: nombre,
          page_url: window.location.href,
          fbp: getCookie('_fbp'),
          fbc: getCookie('_fbc')
        })
      });
      console.log("Evento enviado al servidor");
    } catch (error) {
      console.error("Error al contactar al Worker:", error);
    }

    // 2. Preparación del enlace de WhatsApp
    const mensaje = `Hola, soy ${nombre} y quiero más información`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    // 3. Esperamos un poco para asegurar que el Píxel se envíe antes de salir
    setTimeout(() => {
      window.location.href = url;
    }, 800); 
  }

  // Iniciar proceso
  procesarYRedirigir();
</script>
</body>
</html>
