<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body {
      background-color: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #25D366;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>

  <script>
    const numero = '5491161190295';
    const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
    const eventId = sessionStorage.getItem('wa_event_id');

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }

    function getFbp() {
      const fromStorage = localStorage.getItem('fbp');
      if (fromStorage) return fromStorage;

      const fromCookie = getCookie('_fbp');
      if (fromCookie) {
        localStorage.setItem('fbp', fromCookie);
        return fromCookie;
      }

      return null;
    }

    function getFbc() {
      const fromStorage = localStorage.getItem('fbc');
      if (fromStorage) return fromStorage;

      const fromCookie = getCookie('_fbc');
      if (fromCookie) {
        localStorage.setItem('fbc', fromCookie);
        return fromCookie;
      }

      const fbclid = new URLSearchParams(window.location.search).get('fbclid');
      if (fbclid) {
        const generatedFbc = `fb.1.${Date.now()}.${fbclid}`;
        localStorage.setItem('fbclid', fbclid);
        localStorage.setItem('fbc', generatedFbc);
        return generatedFbc;
      }

      return null;
    }

    function buildWhatsappUrl() {
      const mensaje = `Hola, soy ${nombre} y quiero más información`;
      return `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
    }

    async function sendContactEvent() {
      const payload = {
        event_id: eventId,
        event_name: '',
        nombre: nombre,
        page_url: window.location.href,
        fbp: getFbp(),
        fbc: getFbc()
      };

      return fetch('https://katyblue.daniyons1996.workers.dev/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        keepalive: true,
        body: JSON.stringify(payload)
      });
    }

    async function procesarYRedirigir() {
      if (!nombre || !eventId) {
        window.location.href = 'index.html';
        return;
      }

      try {
        await sendContactEvent();
      } catch (error) {
        console.error('Error al contactar al Worker:', error);
      } finally {
        sessionStorage.removeItem('wa_event_id');
        sessionStorage.removeItem('wa_nombre');

        setTimeout(() => {
          window.location.replace(buildWhatsappUrl());
        }, 800);
      }
    }

    procesarYRedirigir();
  </script>
</body>
</html>
