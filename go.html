<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body {
      background-color: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #25D366;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>

  <script>
    const WORKER_URL = "https://TU-WORKER.workers.dev";
    const REDIRECT_URL = "https://wa.me/5491161190295"; // cambiá esto si querés otro destino

    const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
    const eventId = sessionStorage.getItem('wa_event_id');

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return '';
    }

    async function procesarYRedirigir() {
      if (!nombre || !eventId) {
        window.location.replace('index.html');
        return;
      }

      const sentKey = 'sent_' + eventId;

      // Si ya se envió este event_id en esta sesión, no lo reenvía
      if (sessionStorage.getItem(sentKey) === '1') {
        const mensajeRapido = `Hola, soy ${nombre} y quiero más información`;
        const salidaRapida = REDIRECT_URL.includes('wa.me')
          ? `${REDIRECT_URL}?text=${encodeURIComponent(mensajeRapido)}`
          : REDIRECT_URL;
        window.location.replace(salidaRapida);
        return;
      }

      sessionStorage.setItem(sentKey, '1');

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          keepalive: true,
          body: JSON.stringify({
            event_id: eventId,
            event_name: 'Contact',
            page_url: window.location.href,
            nombre: nombre,
            fbp: getCookie('_fbp'),
            fbc: getCookie('_fbc')
          })
        });

        const data = await res.json().catch(() => ({}));
        console.log('Respuesta Worker:', data);

        if (!res.ok) {
          console.error('Worker respondió error');
        }
      } catch (err) {
        console.error('Error enviando al worker:', err);
      }

      const mensaje = `Hola, soy ${nombre} y quiero más información`;
      const finalUrl = REDIRECT_URL.includes('wa.me')
        ? `${REDIRECT_URL}?text=${encodeURIComponent(mensaje)}`
        : REDIRECT_URL;

      setTimeout(() => {
        sessionStorage.removeItem('wa_event_id');
        sessionStorage.removeItem('wa_nombre');
        window.location.replace(finalUrl);
      }, 1200);
    }

    procesarYRedirigir();
  </script>
</body>
</html>
