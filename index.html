<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOLDEN BLACK</title>

  <script>
    const PIXEL_ID = 'TU_PIXEL_ID';

    function generateEventId() {
      return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    }

    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=true;
    t.src=v;s=b.getElementsByTagName(e);
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('set', 'autoConfig', false, PIXEL_ID);
    fbq('init', PIXEL_ID);

    // Solo PageView en navegador
    fbq('track', 'PageView');
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .wrap {
      max-width: 420px;
      margin: 80px auto;
      padding: 24px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #25D366;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GOLDEN BLACK</h1>
    <p>Ingresá tu nombre para continuar.</p>

    <input id="nombre_usuario" type="text" placeholder="Tu nombre" autocomplete="off" />
    <button id="btn-continuar" type="button">CONTINUAR</button>
  </div>

  <script>
    document.getElementById('btn-continuar').addEventListener('click', function () {
      const input = document.getElementById('nombre_usuario');
      const nombre = input.value.trim();

      if (!nombre) {
        input.style.border = '2px solid red';
        input.focus();
        return;
      }

      // Generamos el event_id al momento del click
      const eventId = generateEventId();

      sessionStorage.setItem('wa_nombre', nombre);
      sessionStorage.setItem('wa_event_id', eventId);

      // Limpiamos cualquier marca vieja de envío para ese evento
      sessionStorage.removeItem('sent_' + eventId);

      window.location.href = 'go.html';
    });
  </script>
</body>
</html>
