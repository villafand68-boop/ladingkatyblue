<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDEN BLACK</title>

<script>
const PIXEL_ID = '1491313232345277';

// 1. Función para generar IDs únicos
function generateEventId() {
  return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}

// 2. Generar el ID para el evento de conversión (Contact) por adelantado
let currentEventId = generateEventId();
sessionStorage.setItem('wa_event_id', currentEventId);

!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=true;
t.src=v;s=b.getElementsByTagName(e);
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('set', 'autoConfig', false, PIXEL_ID);
fbq('init', PIXEL_ID);

// Track de PageView con su propio ID independiente
fbq('track', 'PageView', {}, { eventID: generateEventId() });
</script>

<style>
  body { margin:0; padding:0; background:url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed; background-size:cover; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; display:flex; flex-direction:column; align-items:center; min-height:100vh; text-align:center; }
  .container { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; margin-top: 50px; width: 90%; max-width: 400px; border: 1px solid #c9a441; box-shadow: 0 0 20px rgba(201, 164, 65, 0.3); }
  h1 { color: #c9a441; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
  p { font-size: 1.1em; line-height: 1.5; }
  input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #c9a441; background: #111; color: white; box-sizing: border-box; font-size: 1em; }
  button { width: 100%; padding: 15px; border: none; border-radius: 5px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; font-weight: bold; font-size: 1.2em; cursor: pointer; transition: transform 0.2s; }
  button:active { transform: scale(0.98); }
  #popup-container { position: fixed; bottom: 20px; left: 20px; z-index: 1000; }
  .popup { background: rgba(255,255,255,0.95); color: #333; padding: 12px 20px; border-radius: 10px; margin-top: 10px; animation: slideIn 0.5s ease-out, fadeOut 0.5s ease-in 4.5s forwards; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-left: 5px solid #25D366; }
  @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(-120%); } }
</style>
</head>
<body>

<div class="container">
  <h1>GOLDEN BLACK</h1>
  <p>Ingresa tu nombre para recibir tu bono exclusivo y comenzar a ganar hoy mismo.</p>
  
  <input type="text" id="nombre_usuario" placeholder="Tu nombre aquí..." autocomplete="off">
  
  <button id="boton-whatsapp">OBTENER BONO AHORA</button>
  
  <p style="font-size: 0.8em; margin-top: 20px; color: #888;">⚡️ Conexión segura y directa vía WhatsApp</p>
</div>

<div id="popup-container"></div>

<script>
// --- Lógica del Botón y Redirección ---
document.addEventListener('DOMContentLoaded', () => {
  const disparador = document.getElementById('boton-whatsapp');
  
  if(disparador) {
    disparador.addEventListener('pointerdown', function () {
      const nombreInput = document.getElementById('nombre_usuario');
      const nombreValue = nombreInput.value.trim();

      if (!nombreValue) {
        nombreInput.style.placeholder = "Por favor escribe tu nombre";
        nombreInput.style.border = "2px solid #ff4444";
        return;
      }

      // Guardamos el nombre para usarlo en go.html y el mensaje de WA
      sessionStorage.setItem('wa_nombre', nombreValue);

      // Redirigimos a go.html (allí se disparan los eventos de contacto)
      window.location.href = 'go.html';
    });
  }
});

// --- POPUPS DE GANADORES ---
const winners = ["Laura M.", "Pedro T.", "Mariana L.", "Carlos G.", "Lucía F.", "Martín P.", "Sofía R.", "Jorge V."];
let winnerIndex = 0;

function showPopup(){
  const container = document.getElementById("popup-container");
  const popup = document.createElement("div");
  popup.className = "popup";
  const amount = Math.floor(Math.random() * (700000 - 50000 + 1)) + 50000;
  popup.innerHTML = `🏆 ${winners[winnerIndex]} acaba de ganar $${amount.toLocaleString("es-AR")}`;
  
  container.appendChild(popup);
  
  // Limpiar el DOM después de la animación
  setTimeout(() => popup.remove(), 5000);
  
  winnerIndex = (winnerIndex + 1) % winners.length;
}

// Mostrar primer popup a los 3 segundos y luego cada 8
setTimeout(() => {
  showPopup();
  setInterval(showPopup, 8000);
}, 3000);
</script>

</body>
</html>
