<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOLDEN BLACK</title>

  <script>
    const PIXEL_ID = '1491313232345277';

    function generateEventId() {
      return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    }

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) {
        return parts.pop().split(';').shift();
      }
      return null;
    }

    function persistMetaSignals() {
      try {
        const params = new URLSearchParams(window.location.search);
        const fbclid = params.get('fbclid');

        const cookieFbp = getCookie('_fbp');
        if (cookieFbp) localStorage.setItem('fbp', cookieFbp);

        const cookieFbc = getCookie('_fbc');
        if (cookieFbc) {
          localStorage.setItem('fbc', cookieFbc);
        } else if (fbclid) {
          const generatedFbc = `fb.1.${Date.now()}.${fbclid}`;
          localStorage.setItem('fbc', generatedFbc);
        }
      } catch (error) {
        console.error('Error guardando señales Meta:', error);
      }
    }

    persistMetaSignals();

    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;
      n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;
      n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

    fbq('set', 'autoConfig', false, PIXEL_ID);
    fbq('init', PIXEL_ID);
    fbq('track', 'PageView');
    fbq('track', 'ViewContent');
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('imagen verde.png') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    .container { padding: 50px 20px; }

    .logo {
      width: 300px;
      height: 300px;
      background: url('logo_golden_black.png') no-repeat center center;
      background-size: cover;
      border-radius: 50%;
      margin: 80px auto 20px auto;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    }

    .title { font-size: 45px; margin: 30px 0; }
    .subtitle { font-size: 28px; color: #FFA500; margin-bottom: 40px; }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 25px 50px;
      background-color: #25D366;
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.6);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo"></div>
    <div class="title">🍀 UNITE A LOS QUE ESTÁN GANANDO 🍀</div>
    <div class="subtitle">👇 Tocá el botón y comunicate ahora mismo 👇</div>

    <a
      href="https://api.whatsapp.com/send?phone=541161190266&text=Hola%20quiero%20info"
      class="button"
      id="whatsappButton"
    >
      Contactar por WhatsApp
    </a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const whatsappBtn = document.getElementById('whatsappButton');
      let contactSent = false;

      if (!whatsappBtn) return;

      whatsappBtn.addEventListener('click', function (event) {
        event.preventDefault();

        if (contactSent) return;
        contactSent = true;

        const targetUrl = whatsappBtn.href;
        const eventId = generateEventId();

        const fbp = localStorage.getItem('fbp') || getCookie('_fbp') || null;
        const fbc = localStorage.getItem('fbc') || getCookie('_fbc') || null;

        const payload = {
          event_name: '',
          event_id: eventId,
          page_url: window.location.href,
          fbp,
          fbc,
          value: 1,
          currency: 'ARS'
        };

        const redirect = () => {
          window.location.href = targetUrl;
        };

        try {
          fetch('https://katyblue.daniyons1996.workers.dev/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            keepalive: true,
            body: JSON.stringify(payload)
          })
          .finally(() => {
            setTimeout(redirect, 350);
          });

          setTimeout(redirect, 1200);
        } catch (e) {
          setTimeout(redirect, 200);
        }
      });
    });
  </script>
</body>
</html>
